<svg width="960" height="300" viewBox="0 0 960 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#141b33"/>
    </linearGradient>
    <linearGradient id="title" x1="280" y1="80" x2="680" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="line" x1="120" y1="0" x2="840" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.25" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="0.75" stop-color="#e879f9"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="dotglow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="960" height="300" rx="16" fill="url(#bg)"/>

  <!-- ambient orbs, breathing -->
  <circle cx="120" cy="60" r="90" fill="#38bdf8" filter="url(#glow)">
    <animate attributeName="opacity" values="0.10;0.20;0.10" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="240" r="110" fill="#e879f9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.16;0.08;0.16" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="310" r="80" fill="#818cf8" opacity="0.10" filter="url(#glow)"/>

  <!-- left orbital system (agents orbiting the core) -->
  <g>
    <circle cx="100" cy="130" r="6" fill="#a78bfa"/>
    <circle cx="100" cy="130" r="22" stroke="#38bdf8" stroke-width="1" opacity="0.35"/>
    <circle cx="100" cy="130" r="38" stroke="#a78bfa" stroke-width="1" opacity="0.25"/>
    <g>
      <circle cx="122" cy="130" r="4" fill="#7dd3fc" filter="url(#dotglow)"/>
      <animateTransform attributeName="transform" type="rotate" from="0 100 130" to="360 100 130" dur="6s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="138" cy="130" r="3.2" fill="#f0abfc" filter="url(#dotglow)"/>
      <circle cx="62" cy="130" r="2.6" fill="#34d399" filter="url(#dotglow)"/>
      <animateTransform attributeName="transform" type="rotate" from="360 100 130" to="0 100 130" dur="11s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- right orbital system, mirrored -->
  <g>
    <circle cx="860" cy="130" r="6" fill="#e879f9"/>
    <circle cx="860" cy="130" r="22" stroke="#e879f9" stroke-width="1" opacity="0.35"/>
    <circle cx="860" cy="130" r="38" stroke="#fb7185" stroke-width="1" opacity="0.25"/>
    <g>
      <circle cx="882" cy="130" r="4" fill="#f0abfc" filter="url(#dotglow)"/>
      <animateTransform attributeName="transform" type="rotate" from="360 860 130" to="0 860 130" dur="7s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="898" cy="130" r="3.2" fill="#7dd3fc" filter="url(#dotglow)"/>
      <circle cx="822" cy="130" r="2.6" fill="#fda4af" filter="url(#dotglow)"/>
      <animateTransform attributeName="transform" type="rotate" from="0 860 130" to="360 860 130" dur="13s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- eyebrow -->
  <text x="480" y="72" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="14" font-weight="600" letter-spacing="6" fill="#8b9dc9">AGENTIC DELIVERY SYSTEM · CLAUDE CODE</text>

  <!-- title -->
  <text x="480" y="146" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="72" font-weight="800" letter-spacing="1" fill="url(#title)">DevFlow</text>

  <!-- tagline -->
  <text x="480" y="182" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="17" fill="#aab6d8">One command in. Shipped, verified software out.</text>

  <!-- pipeline -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">
    <line x1="150" y1="238" x2="810" y2="238" stroke="url(#line)" stroke-width="2" opacity="0.55"/>

    <!-- pulse traveling along the pipeline -->
    <circle r="5" fill="#ffffff" filter="url(#dotglow)" opacity="0.9">
      <animateMotion path="M 150 238 H 810" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.05;0.95;1" dur="6s" repeatCount="indefinite"/>
    </circle>

    <g>
      <rect x="150" y="222" width="88" height="32" rx="16" fill="#0b1020" stroke="#38bdf8" stroke-width="1.5">
        <animate attributeName="stroke-width" values="1.5;3;1.5;1.5" keyTimes="0;0.05;0.2;1" dur="6s" repeatCount="indefinite"/>
      </rect>
      <text x="194" y="243" text-anchor="middle" fill="#7dd3fc">PLAN</text>
    </g>
    <g>
      <rect x="288" y="222" width="88" height="32" rx="16" fill="#0b1020" stroke="#818cf8" stroke-width="1.5">
        <animate attributeName="stroke-width" values="1.5;1.5;3;1.5;1.5" keyTimes="0;0.2;0.26;0.4;1" dur="6s" repeatCount="indefinite"/>
      </rect>
      <text x="332" y="243" text-anchor="middle" fill="#a5b4fc">BUILD</text>
    </g>
    <g>
      <rect x="426" y="222" width="88" height="32" rx="16" fill="#0b1020" stroke="#a78bfa" stroke-width="1.5">
        <animate attributeName="stroke-width" values="1.5;1.5;3;1.5;1.5" keyTimes="0;0.42;0.48;0.62;1" dur="6s" repeatCount="indefinite"/>
      </rect>
      <text x="470" y="243" text-anchor="middle" fill="#c4b5fd">VERIFY</text>
    </g>
    <g>
      <rect x="564" y="222" width="88" height="32" rx="16" fill="#0b1020" stroke="#e879f9" stroke-width="1.5">
        <animate attributeName="stroke-width" values="1.5;1.5;3;1.5;1.5" keyTimes="0;0.63;0.69;0.83;1" dur="6s" repeatCount="indefinite"/>
      </rect>
      <text x="608" y="243" text-anchor="middle" fill="#f0abfc">DEBUG</text>
    </g>
    <g>
      <rect x="702" y="222" width="108" height="32" rx="16" fill="#0b1020" stroke="#fb7185" stroke-width="1.5">
        <animate attributeName="stroke-width" values="1.5;1.5;3.5;1.5" keyTimes="0;0.88;0.96;1" dur="6s" repeatCount="indefinite"/>
      </rect>
      <text x="756" y="243" text-anchor="middle" fill="#fda4af">SHIP ✓</text>
    </g>
  </g>

  <!-- prompt with blinking cursor -->
  <g font-family="Consolas, Menlo, monospace" font-size="13">
    <text x="480" y="285" text-anchor="middle" fill="#5c6b94">/ship "build something great"</text>
    <text x="592" y="285" fill="#7dd3fc">▌<animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></text>
  </g>
</svg>
