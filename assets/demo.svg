<svg width="820" height="480" viewBox="0 0 820 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tbar" x1="0" y1="0" x2="820" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#151d36"/>
      <stop offset="1" stop-color="#1a2340"/>
    </linearGradient>
    <filter id="winglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- window glow -->
  <rect x="14" y="14" width="792" height="452" rx="14" fill="#6d5bd0" opacity="0.25" filter="url(#winglow)"/>

  <!-- terminal window -->
  <rect x="10" y="10" width="800" height="460" rx="12" fill="#0d1424" stroke="#26335c" stroke-width="1"/>

  <!-- title bar -->
  <path d="M10 22 Q10 10 22 10 H798 Q810 10 810 22 V46 H10 Z" fill="url(#tbar)"/>
  <circle cx="32" cy="28" r="6" fill="#fb7185"/>
  <circle cx="52" cy="28" r="6" fill="#fbbf24"/>
  <circle cx="72" cy="28" r="6" fill="#34d399"/>
  <text x="410" y="33" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="13" fill="#8b9dc9">install → ship — the whole story</text>

  <g font-family="Consolas, Menlo, monospace" font-size="14.5">

    <!-- L1: git clone (typed) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.017;0.018;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="80"><tspan fill="#34d399">❯</tspan><tspan fill="#e2e8f0" xml:space="preserve"> git clone </tspan><tspan fill="#7dd3fc">https://github.com/ljojua1998/skills.git</tspan></text>
      <rect y="64" height="24" fill="#0d1424">
        <animate attributeName="x" values="44;44;510;510" keyTimes="0;0.018;0.082;1" dur="22s" repeatCount="indefinite"/>
        <animate attributeName="width" values="466;466;0;0" keyTimes="0;0.018;0.082;1" dur="22s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- L1 output -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.095;0.11;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="110" fill="#64748b">Cloning into 'skills'... done.</text>
    </g>

    <!-- L2: install (typed) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.117;0.118;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="140"><tspan fill="#34d399">❯</tspan><tspan fill="#e2e8f0" xml:space="preserve"> cd skills; </tspan><tspan fill="#f0abfc">.\install.ps1 -Global</tspan></text>
      <rect y="124" height="24" fill="#0d1424">
        <animate attributeName="x" values="44;44;350;350" keyTimes="0;0.118;0.182;1" dur="22s" repeatCount="indefinite"/>
        <animate attributeName="width" values="306;306;0;0" keyTimes="0;0.118;0.182;1" dur="22s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- L2 output -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.195;0.21;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="170"><tspan fill="#34d399">✓</tspan><tspan fill="#94a3b8" xml:space="preserve"> installed: </tspan><tspan fill="#e2e8f0">12 agents · 13 skills · quality-gate hook</tspan></text>
    </g>

    <!-- L3: claude (typed) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.217;0.218;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="200"><tspan fill="#34d399">❯</tspan><tspan fill="#e2e8f0" xml:space="preserve"> cd my-project; </tspan><tspan fill="#fbbf24">claude</tspan></text>
      <rect y="184" height="24" fill="#0d1424">
        <animate attributeName="x" values="44;44;250;250" keyTimes="0;0.218;0.264;1" dur="22s" repeatCount="indefinite"/>
        <animate attributeName="width" values="206;206;0;0" keyTimes="0;0.218;0.264;1" dur="22s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- L4: /ship (typed) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.29;0.291;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="230"><tspan fill="#34d399">❯</tspan><tspan fill="#e2e8f0" xml:space="preserve"> /ship </tspan><tspan fill="#7dd3fc">"build an expense tracker"</tspan></text>
      <rect y="214" height="24" fill="#0d1424">
        <animate attributeName="x" values="44;44;372;372" keyTimes="0;0.291;0.355;1" dur="22s" repeatCount="indefinite"/>
        <animate attributeName="width" values="328;328;0;0" keyTimes="0;0.291;0.355;1" dur="22s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- pipeline output -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.391;0.405;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="264"><tspan fill="#a78bfa">🧠 planner</tspan><tspan fill="#94a3b8" xml:space="preserve">   6 tickets on the board</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.445;0.459;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="294"><tspan fill="#818cf8">🔨 build</tspan><tspan fill="#94a3b8" xml:space="preserve">     DEV-001…006 — 3 agents in parallel</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.514;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="324"><tspan fill="#fbbf24">🚦 gate</tspan><tspan fill="#94a3b8" xml:space="preserve">      typecheck </tspan><tspan fill="#34d399">✓</tspan><tspan fill="#94a3b8" xml:space="preserve"> lint </tspan><tspan fill="#34d399">✓</tspan><tspan fill="#94a3b8" xml:space="preserve"> tests </tspan><tspan fill="#34d399">42 passing ✓</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.555;0.569;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="354"><tspan fill="#c4b5fd">🔍 verify</tspan><tspan fill="#94a3b8" xml:space="preserve">    qa </tspan><tspan fill="#34d399">✓</tspan><tspan fill="#94a3b8" xml:space="preserve"> security </tspan><tspan fill="#34d399">✓</tspan><tspan fill="#94a3b8" xml:space="preserve"> audit </tspan><tspan fill="#34d399">✓</tspan><tspan fill="#94a3b8" xml:space="preserve"> design </tspan><tspan fill="#34d399">✓</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.609;0.623;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="384"><tspan fill="#f0abfc">🤨 verifier</tspan><tspan fill="#94a3b8" xml:space="preserve">   3 findings → </tspan><tspan fill="#fb7185">1 confirmed</tspan><tspan fill="#94a3b8">, </tspan><tspan fill="#64748b">2 refuted</tspan><tspan fill="#94a3b8" xml:space="preserve">  →  </tspan><tspan fill="#e879f9">🔧 fixed, re-verified </tspan><tspan fill="#34d399">✓</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.664;0.678;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="420"><tspan fill="#34d399" font-weight="700">✅ EPIC-001 done</tspan><tspan fill="#94a3b8" xml:space="preserve">  ·  branch </tspan><tspan fill="#7dd3fc">devflow/epic-001</tspan><tspan fill="#94a3b8" xml:space="preserve">  ·  PR ready</tspan></text>
    </g>

    <!-- idle prompt -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.72;0.734;0.93;0.963" dur="22s" repeatCount="indefinite"/>
      <text x="30" y="450"><tspan fill="#34d399">❯</tspan></text>
      <text x="48" y="450" fill="#7dd3fc">▌<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></text>
    </g>
  </g>
</svg>
